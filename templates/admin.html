<!DOCTYPE HTML>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #b8e0d6;
        }
        .container {
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            flex-grow: 1;
        }
        .sidebar {
            width: 200px;
            background-color: #b8d6ff;
            padding: 20px;
        }
        .sidebar h2 {
            margin-top: 0;
            color: #333;
        }
        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            text-decoration: none;
            color: #333;
        }
        .sidebar a:hover {
            color: #007bff;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
            background-color: #bbdaf0;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>管理菜单</h2>
            <ul>
                <li><a href="/admin/science">科普管理</a></li>
                <li><a href="/admin/birds">鸟单管理</a></li>
            </ul>
        </div>
        <div class="content">
            <h1>欢迎来到管理页面</h1>
            <p>请从左侧菜单选择要管理的内容。</p>
        </div>
    </div>

</body>
</html>
