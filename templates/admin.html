<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸟类帖子管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2c7a7b;
        }
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .post {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .post img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        form {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #2c7a7b;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1f5758;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>鸟类帖子管理</h1>
        <h2>添加新帖子</h2>
        <form id="addPostForm" method="post" action="/admin">
            <input type="text" id="title" placeholder="标题" name="title" required>
            <textarea id="text" placeholder="内容" name="text" required ></textarea>
            <input type="url" id="imageUrl" placeholder="图片URL" name="p-url" required>
            <input type="url" id="imageUrl" placeholder="网址URL" name="url" required>
            <button type="submit">添加帖子</button>
        </form>
        <div class="pagination">
            <button id="prevPage">上一页</button>
            <span id="currentPage"></span>
            <button id="nextPage">下一页</button>
        </div>
    </div>
</body>
</html>
