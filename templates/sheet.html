<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福建省鸟类图鉴</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 0;
        }
        #categories {
            width: 300px;
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        #selected {
            flex-grow: 1;
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
        }
        .category {
            cursor: pointer;
            margin-bottom: 5px;
        }
        .category:hover {
            color: blue;
        }
        .family {
            margin-left: 20px;
        }
        .species {
            margin-left: 40px;
        }
        .selected-category {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }
        .image-upload {
            margin-top: 10px;
        }
        img {
            max-width: 200px;
            max-height: 200px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="categories">
        <h2>鸟类分类</h2>
        <!-- 这里将动态填充分类 -->
    </div>
    <div id="selected">
        <h1>福建省鸟类图鉴</h1>
        <div id="selected-categories">
            <!-- 这里将显示选中的分类 -->
        </div>
    </div>

    <script>
        let birdData = {};

        // 从上一级目录的 JSON 文件加载数据
        fetch('../fjbird.json')
            .then(response => response.json())
            .then(data => {
                birdData = data;
                populateCategories();
            })
            .catch(error => console.error('Error loading bird data:', error));

        function populateCategories() {
            const categoriesDiv = document.getElementById('categories');
            for (const [order, families] of Object.entries(birdData)) {
                const orderDiv = document.createElement('div');
                orderDiv.className = 'category';
                orderDiv.textContent = order;
                categoriesDiv.appendChild(orderDiv);

                for (const [family, species] of Object.entries(families)) {
                    const familyDiv = document.createElement('div');
                    familyDiv.className = 'category family';
                    familyDiv.textContent = family;
                    categoriesDiv.appendChild(familyDiv);

                    species.forEach(specie => {
                        const specieDiv = document.createElement('div');
                        specieDiv.className = 'category species';
                        specieDiv.textContent = specie;
                        specieDiv.onclick = () => addCategory(order, family, specie);
                        categoriesDiv.appendChild(specieDiv);
                    });
                }
            }
        }

        function addCategory(order, family, species) {
            const selectedCategoriesDiv = document.getElementById('selected-categories');
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'selected-category';
            categoryDiv.innerHTML = `
                <h3>${species}</h3>
                <p>${order} - ${family}</p>
                <div class="image-upload">
                    <input type="file" accept="image/*" onchange="handleImageUpload(event, '${species}')">
                </div>
            `;
            selectedCategoriesDiv.appendChild(categoryDiv);
        }

        function handleImageUpload(event, species) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.alt = species;
                    event.target.parentNode.appendChild(img);
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
