<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福建省鸟类图鉴</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 0;
        }
        #categories {
            width: 300px;
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        #selected {
            flex-grow: 1;
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
        }
        .category {
            cursor: pointer;
            margin-bottom: 5px;
        }
        .category:hover {
            color: blue;
        }
        .family {
            margin-left: 20px;
        }
        .species {
            margin-left: 40px;
        }
        .selected-category {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }
        .image-upload {
            margin-top: 10px;
        }
        img {
            max-width: 200px;
            max-height: 200px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="categories">
        <h2></h2>
    </div>
    <div id="selected">
        <h1></h1>
        <div id="selected-categories">
        </div>
    </div>
</body>
</html>
